<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 配置界面预览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #fff;
            padding: 20px;
        }
        .phone {
            max-width: 375px;
            margin: 0 auto;
            background: #0a0a0f;
            border-radius: 40px;
            padding: 20px;
            border: 2px solid #1a1a2e;
        }
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            margin-bottom: 20px;
        }
        .nav-title { font-size: 17px; font-weight: 600; }
        .arrow { font-size: 20px; }
        .status-overview {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .status-item {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            opacity: 0.5;
        }
        .status-item.active {
            opacity: 1;
            border-color: rgba(0, 212, 255, 0.3);
        }
        .status-icon { font-size: 24px; margin-bottom: 4px; }
        .status-name { font-size: 11px; display: block; color: rgba(255, 255, 255, 0.7); }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #6b7280;
            margin: 6px auto 0;
        }
        .status-dot.online { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .status-dot.error { background: #ef4444; }
        .config-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .provider-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .provider-info { flex: 1; }
        .provider-name { font-size: 16px; font-weight: 600; display: block; }
        .provider-desc { font-size: 12px; color: rgba(255, 255, 255, 0.5); }
        .switch {
            width: 50px;
            height: 28px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            position: relative;
            cursor: pointer;
        }
        .switch.on { background: #3b82f6; }
        .switch::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }
        .switch.on::after { left: 24px; }
        .config-form {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .form-item { margin-bottom: 14px; }
        .form-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 6px;
            display: block;
        }
        .form-input {
            width: 100%;
            height: 44px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 10px;
            padding: 0 14px;
            color: #fff;
            font-size: 14px;
        }
        .test-btn {
            width: 100%;
            height: 40px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 12px;
            cursor: pointer;
        }
        .test-btn.green {
            background: linear-gradient(135deg, #10b981, #3b82f6);
        }
        .action-bar {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .save-btn {
            flex: 2;
            height: 48px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 600;
        }
        .reset-btn {
            flex: 1;
            height: 48px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.7);
        }
        .tabbar {
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            margin-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #666;
        }
        .tab-item.active { color: #00d4ff; }
        .tab-icon { font-size: 22px; }
        .tab-text { font-size: 11px; }
    </style>
</head>
<body>
    <div class="phone">
        <!-- 导航栏 -->
        <div class="nav">
            <span class="arrow">←</span>
            <span class="nav-title">🔌 API 配置</span>
            <span style="width: 20px;"></span>
        </div>

        <!-- 状态概览 -->
        <div class="status-overview">
            <div class="status-item active">
                <div class="status-icon">🔧</div>
                <span class="status-name">OpenCode</span>
                <div class="status-dot online"></div>
            </div>
            <div class="status-item">
                <div class="status-icon">🦞</div>
                <span class="status-name">OpenClaw</span>
                <div class="status-dot"></div>
            </div>
            <div class="status-item">
                <div class="status-icon">🤖</div>
                <span class="status-name">OpenAI</span>
                <div class="status-dot"></div>
            </div>
        </div>

        <!-- OpenCode 配置 -->
        <div class="config-card">
            <div class="card-header">
                <div class="provider-icon" style="background: linear-gradient(135deg, #3b82f6, #8b5cf6);">🔧</div>
                <div class="provider-info">
                    <span class="provider-name">OpenCode</span>
                    <span class="provider-desc">本地 AI 编程助手</span>
                </div>
                <div class="switch on"></div>
            </div>
            <div class="config-form">
                <div class="form-item">
                    <span class="form-label">API 地址</span>
                    <input class="form-input" value="http://localhost:12345" readonly>
                </div>
                <div class="form-item">
                    <span class="form-label">默认模型</span>
                    <input class="form-input" value="claude-3-opus" readonly>
                </div>
                <div class="test-btn green">✓ 已连接</div>
            </div>
        </div>

        <!-- OpenAI 配置 -->
        <div class="config-card">
            <div class="card-header">
                <div class="provider-icon" style="background: linear-gradient(135deg, #10b981, #3b82f6);">🤖</div>
                <div class="provider-info">
                    <span class="provider-name">OpenAI</span>
                    <span class="provider-desc">GPT-4 / GPT-3.5</span>
                </div>
                <div class="switch"></div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="action-bar">
            <div class="save-btn">💾 保存所有配置</div>
            <div class="reset-btn">🔄 重置</div>
        </div>

        <!-- 底部导航 -->
        <div class="tabbar">
            <div class="tab-item">
                <span class="tab-icon">🖥️</span>
                <span class="tab-text">控制</span>
            </div>
            <div class="tab-item active">
                <span class="tab-icon">🔌</span>
                <span class="tab-text">API</span>
            </div>
            <div class="tab-item">
                <span class="tab-icon">⚙️</span>
                <span class="tab-text">设置</span>
            </div>
        </div>
    </div>

    <script>
        // 点击开关切换
        document.querySelectorAll('.switch').forEach(sw => {
            sw.addEventListener('click', () => {
                sw.classList.toggle('on');
            });
        });

        // 保存按钮提示
        document.querySelector('.save-btn').addEventListener('click', () => {
            alert('✅ 配置已保存！');
        });

        // 重置按钮提示
        document.querySelector('.reset-btn').addEventListener('click', () => {
            if (confirm('确定要重置所有配置吗？')) {
                alert('🔄 已重置为默认值');
            }
        });

        // Tab 切换
        document.querySelectorAll('.tab-item').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
            });
        });
    </script>
</body>
</html>
