      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="192" height="192" rx="32" fill="url(#bg)"/>
  
  <!-- 电脑屏幕 -->
  <rect x="36" y="40" width="120" height="80" rx="6" fill="#3b82f6" stroke="#60a5fa" stroke-width="2"/>
  
  <!-- 屏幕内容 -->
  <rect x="44" y="48" width="104" height="64" rx="2" fill="#0d2137"/>
  
  <!-- 代码行 -->
  <rect x="52" y="58" width="60" height="4" rx="2" fill="#4ade80"/>
  <rect x="52" y="68" width="80" height="4" rx="2" fill="#60a5fa"/>
  <rect x="52" y="78" width="50" height="4" rx="2" fill="#f472b6"/>
  <rect x="52" y="88" width="70" height="4" rx="2" fill="#fbbf24"/>
  
  <!-- 电脑底座 -->
  <rect x="76" y="122" width="40" height="8" rx="2" fill="#4b5563"/>
  <rect x="66" y="130" width="60" height="6" rx="2" fill="#374151"/>
  
  <!-- 手机 -->
  <rect x="124" y="96" width="36" height="64" rx="6" fill="#1f2937" stroke="#3b82f6" stroke-width="2"/>
  <rect x="128" y="102" width="28" height="48" rx="2" fill="#0d2137"/>
  
  <!-- 手机内容 - 聊天气泡 -->
  <rect x="132" y="110" width="20" height="8" rx="2" fill="#3b82f6"/>
  <rect x="132" y="122" width="16" height="6" rx="2" fill="#4b5563"/>
  
