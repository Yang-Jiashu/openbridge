<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3a"/>
      <stop offset="100%" style="stop-color:#0d1225"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="192" height="192" rx="44" fill="url(#bgGradient)"/>
  
  <!-- 电脑屏幕外框 -->
  <rect x="28" y="36" width="100" height="72" rx="10" fill="#ffffff" fill-opacity="0.2"/>
  
  <!-- 电脑屏幕 -->
  <rect x="32" y="40" width="92" height="60" rx="6" fill="url(#screenGradient)"/>
  
  <!-- 代码行 - 模拟终端 -->
  <rect x="40" y="50" width="50" height="4" rx="2" fill="#4ade80" filter="url(#glow)"/>
  <rect x="40" y="60" width="70" height="4" rx="2" fill="#60a5fa" filter="url(#glow)"/>
  <rect x="40" y="70" width="40" height="4" rx="2" fill="#f472b6" filter="url(#glow)"/>
  <rect x="40" y="80" width="60" height="4" rx="2" fill="#fbbf24" filter="url(#glow)"/>
  
  <!-- 电脑底座 -->
  <path d="M62 112 L94 112 L94 120 L62 120 Z" fill="#ffffff" fill-opacity="0.3"/>
  <rect x="52" y="120" width="52" height="8" rx="2" fill="#ffffff" fill-opacity="0.2"/>
  
  <!-- 手机 -->
  <rect x="116" y="80" width="52" height="88" rx="12" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="2" stroke-opacity="0.3"/>
  <rect x="120" y="88" width="44" height="70" rx="6" fill="url(#screenGradient)"/>
  
  <!-- 手机上的聊天气泡 -->
  <rect x="126" y="96" width="32" height="10" rx="4" fill="#667eea"/>
  <rect x="126" y="112" width="24" height="8" rx="4" fill="#ffffff" fill-opacity="0.3"/>
  
  <!-- 连接动画效果 -->
  <circle cx="108" cy="84" r="5" fill="#4ade80" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- 信号波纹 -->
  <path d="M114 84 Q120 78 126 84" stroke="#4ade80" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
  </path>
</svg>