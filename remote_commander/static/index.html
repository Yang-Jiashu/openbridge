<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PC 远程助手</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: #0084ff;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 18px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user-message {
            background-color: #0084ff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            background-color: #e4e6eb;
            color: black;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            white-space: pre-wrap; /* 保留换行符 */
        }

        .loading {
            align-self: flex-start;
            color: #888;
            font-size: 0.9em;
            margin-left: 10px;
            display: none;
        }

        #input-area {
            background-color: white;
            padding: 10px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: #0084ff;
        }

        button {
            background-color: #0084ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        button:disabled {
            background-color: #ccc;
        }
    </style>
</head>
<body>
    <header>PC 远程控制中心</header>
    
    <div id="chat-container">
        <div class="message bot-message">你好！我是你的 PC 助手。告诉我你想做什么，比如“查看现在的进程”或“修改 config.json”。</div>
    </div>
    <div class="loading" id="loading">正在思考并执行操作...</div>

    <div id="input-area">
        <input type="text" id="message-input" placeholder="输入指令..." autocomplete="off">
        <button onclick="sendMessage()" id="send-btn">发送</button>
    </div>

    <script>
        const input = document.getElementById('message-input');
        const chatContainer = document.getElementById('chat-container');
        const sendBtn = document.getElementById('send-btn');
        const loading = document.getElementById('loading');

        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            // Add user message
            addMessage(text, 'user-message');
            input.value = '';
            input.disabled = true;
            sendBtn.disabled = true;
            loading.style.display = 'block';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: text })
                });

                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }

                const data = await response.json();
                addMessage(data.response, 'bot-message');

            } catch (error) {
                addMessage('发生错误: ' + error.message, 'bot-message');
            } finally {
                input.disabled = false;
                sendBtn.disabled = false;
                loading.style.display = 'none';
                input.focus();
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        function addMessage(text, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.textContent = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
</html>
